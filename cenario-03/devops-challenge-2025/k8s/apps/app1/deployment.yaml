---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
  namespace: devops-challenge
  labels:
    app: app1
    version: "1.0"
    component: api
    language: python
  annotations:
    description: "App1 Python/Flask — DevOps Challenge 2025"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0      # zero-downtime
      maxSurge: 1
  template:
    metadata:
      labels:
        app: app1
        version: "1.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      # ── Afinidade: espalhar pods em nós diferentes ────────────────────────
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["app1"]
                topologyKey: "kubernetes.io/hostname"

      containers:
        - name: app1
          image: devops-challenge/app1-python:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http

          env:
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: app-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                secretKeyRef:
                  name: app-config
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: redis-password
            - name: CACHE_TTL
              value: "10"

          # ── Recursos ────────────────────────────────────────────────────────
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"

          # ── Health checks ───────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /health
              port: 5000
            failureThreshold: 10
            periodSeconds: 5

      # ── Graceful shutdown ────────────────────────────────────────────────────
      terminationGracePeriodSeconds: 30

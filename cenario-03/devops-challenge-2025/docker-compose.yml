services:

  # ── Geração automática de certificados TLS ────────────────────────────────
  cert-gen:
    image: alpine/openssl:latest
    container_name: cert-gen
    volumes:
      - tls_certs:/certs
      - ./nginx/certs/gen-certs.sh:/gen-certs.sh:ro
    entrypoint: ["sh", "/gen-certs.sh"]
    networks: [devops-net]

  # ── Aplicações ───────────────────────────────────────────────────────────────
  app1:
    build:
      context: ./app1-python
      dockerfile: Dockerfile
    container_name: app1
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FORWARDED_ALLOW_IPS: "*"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [devops-net]

  app2:
    build:
      context: ./app2-node
      dockerfile: Dockerfile
    container_name: app2
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [devops-net]

  # ── Cache Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [devops-net]

  # ── Reverse Proxy + TLS + Cache HTTP ─────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "${APP_HTTP_PORT:-8080}:80"
      - "${APP_HTTPS_PORT:-8443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - tls_certs:/etc/nginx/certs:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      cert-gen:
        condition: service_completed_successfully
      app1:
        condition: service_healthy
      app2:
        condition: service_healthy
    networks: [devops-net]

  # ── Observabilidade ───────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    networks: [devops-net]

  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD:    ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP:        "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/apps-overview.json
      GF_FEATURE_TOGGLES_ENABLE:     "publicDashboards"
      GF_SERVER_ROOT_URL:            "http://localhost:${GRAFANA_PORT:-3001}"
    volumes:
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks: [devops-net]

  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    container_name: redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on: [redis]
    networks: [devops-net]

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.3.0
    container_name: nginx-exporter
    restart: unless-stopped
    command: ["--nginx.scrape-uri=http://nginx/nginx_status"]
    depends_on: [nginx]
    networks: [devops-net]

networks:
  devops-net:
    name: devops-net
    driver: bridge

volumes:
  tls_certs:
  nginx_cache:
  prometheus_data:
  grafana_data:

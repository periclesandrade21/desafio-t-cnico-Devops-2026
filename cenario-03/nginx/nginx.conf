# ── Zonas de cache ─────────────────────────────────────────────────────────────
proxy_cache_path /var/cache/nginx/app1
    levels=1:2
    keys_zone=app1_cache:10m
    max_size=100m
    inactive=1m
    use_temp_path=off;

proxy_cache_path /var/cache/nginx/app2
    levels=1:2
    keys_zone=app2_cache:10m
    max_size=100m
    inactive=2m
    use_temp_path=off;

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Permitir health-check interno sem redirect
    location /health {
        return 200 '{"status":"ok","service":"nginx","tls":"no"}';
        add_header Content-Type application/json;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS principal ────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # ── Certificados (gerados automaticamente pelo cert-gen) ──────────────────
    ssl_certificate     /etc/nginx/certs/nginx.crt;
    ssl_certificate_key /etc/nginx/certs/nginx.key;

    # ── Parâmetros TLS modernos (TLS 1.2 / 1.3) ──────────────────────────────
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header X-Frame-Options           "SAMEORIGIN"                           always;
    add_header X-XSS-Protection          "1; mode=block"                        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;

    # ── App1 (Python/Flask) — cache 10 segundos ───────────────────────────────
    location /app1/ {
        proxy_pass         http://app1:5000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache        app1_cache;
        proxy_cache_valid  200 10s;
        proxy_cache_key    "$scheme$request_method$host$request_uri";
        proxy_cache_use_stale error timeout updating;

        add_header X-Cache-Status $upstream_cache_status always;
        add_header X-App          "app1-python"          always;
    }

    # ── App2 (Node.js/Express) — cache 1 minuto ───────────────────────────────
    location /app2/ {
        proxy_pass         http://app2:3000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache        app2_cache;
        proxy_cache_valid  200 60s;
        proxy_cache_key    "$scheme$request_method$host$request_uri";
        proxy_cache_use_stale error timeout updating;

        add_header X-Cache-Status $upstream_cache_status always;
        add_header X-App          "app2-node"            always;
    }

    # ── Nginx status (Prometheus exporter) ───────────────────────────────────
    location /nginx_status {
        stub_status;
        allow 172.0.0.0/8;
        allow 10.0.0.0/8;
        allow 127.0.0.1;
        deny  all;
    }

    # ── Health ────────────────────────────────────────────────────────────────
    location /health {
        return 200 '{"status":"ok","service":"nginx","tls":"yes"}';
        add_header Content-Type application/json;
    }
}

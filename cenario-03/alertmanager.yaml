---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      slack_api_url: 'https://hooks.slack.com/services/CHANGE_ME'

    route:
      group_by: ['alertname', 'namespace', 'severity']
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'default'
      routes:
        - match:
            severity: critical
          receiver: 'critical-alerts'
          continue: true
        - match:
            severity: warning
          receiver: 'warning-alerts'

    receivers:
      - name: 'default'
        slack_configs:
          - channel: '#devops-alerts'
            title: '{{ .GroupLabels.alertname }}'
            text: >-
              {{ range .Alerts }}
                *Alert:* {{ .Annotations.summary }}
                *Details:* {{ .Annotations.description }}
                *Severity:* {{ .Labels.severity }}
              {{ end }}
            send_resolved: true

      - name: 'critical-alerts'
        slack_configs:
          - channel: '#devops-critical'
            title: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
            text: >-
              {{ range .Alerts }}
                *Alert:* {{ .Annotations.summary }}
                *Description:* {{ .Annotations.description }}
                *Namespace:* {{ .Labels.namespace }}
              {{ end }}
            send_resolved: true

      - name: 'warning-alerts'
        slack_configs:
          - channel: '#devops-alerts'
            title: '⚠️ WARNING: {{ .GroupLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
            send_resolved: true

    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'namespace']

  alert-rules.yml: |
    groups:
      # ── Disponibilidade das Aplicações ──────────────────────────────────────
      - name: apps-availability
        rules:
          - alert: AppDown
            expr: up{job=~"app1.*|app2.*"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Aplicação {{ $labels.job }} está DOWN"
              description: "A aplicação {{ $labels.job }} não está respondendo há mais de 1 minuto."

          - alert: AppHighErrorRate
            expr: |
              (
                sum(rate(flask_http_request_total{status=~"5.."}[5m])) by (job) /
                sum(rate(flask_http_request_total[5m])) by (job)
              ) > 0.05
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Alta taxa de erros 5xx em {{ $labels.job }}"
              description: "Taxa de erros acima de 5% nos últimos 2 minutos."

          - alert: AppHighLatency
            expr: |
              histogram_quantile(0.95,
                sum(rate(flask_http_request_duration_seconds_bucket[5m])) by (le, job)
              ) > 1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Alta latência P95 em {{ $labels.job }}"
              description: "P95 de latência > 1s por 5 minutos."

          - alert: AppReplicasLow
            expr: |
              kube_deployment_status_replicas_ready{namespace="devops-challenge"}
              < kube_deployment_spec_replicas{namespace="devops-challenge"}
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Réplicas abaixo do esperado: {{ $labels.deployment }}"
              description: "Deployment {{ $labels.deployment }} tem menos réplicas prontas que o esperado."

      # ── Redis ───────────────────────────────────────────────────────────────
      - name: redis-health
        rules:
          - alert: RedisDown
            expr: redis_up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Redis DOWN"
              description: "Instância Redis não está respondendo."

          - alert: RedisCacheMissHigh
            expr: |
              (
                rate(redis_keyspace_misses_total[5m]) /
                (rate(redis_keyspace_hits_total[5m]) + rate(redis_keyspace_misses_total[5m]) + 0.001)
              ) > 0.5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Taxa de cache miss alta no Redis (> 50%)"
              description: "O cache Redis está com mais de 50% de misses. Verificar TTLs e padrões de acesso."

          - alert: RedisMemoryHigh
            expr: |
              redis_memory_used_bytes / redis_memory_max_bytes > 0.85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Redis usando > 85% da memória máxima"
              description: "Memória Redis em {{ $value | humanizePercentage }}. Considerar aumentar limit ou ajustar política de eviction."

          - alert: RedisSentinelMasterMissing
            expr: count(redis_sentinel_masters) < 1
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Redis Sentinel sem master"
              description: "Sentinel não detecta nenhum master Redis. Verificar cluster."

      # ── Nginx / HAProxy ─────────────────────────────────────────────────────
      - name: proxy-health
        rules:
          - alert: NginxDown
            expr: up{job="nginx"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Nginx DOWN"
              description: "O proxy reverso Nginx não está respondendo."

          - alert: HAProxyBackendDown
            expr: haproxy_backend_status == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Backend HAProxy DOWN: {{ $labels.backend }}"
              description: "O backend {{ $labels.backend }} do HAProxy está inativo."

      # ── K8s Infrastructure ──────────────────────────────────────────────────
      - name: k8s-health
        rules:
          - alert: NodeNotReady
            expr: kube_node_status_condition{condition="Ready",status="true"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Nó Kubernetes não está Ready: {{ $labels.node }}"
              description: "O nó {{ $labels.node }} está NotReady há mais de 2 minutos."

          - alert: PodCrashLooping
            expr: |
              rate(kube_pod_container_status_restarts_total[15m]) * 60 * 15 > 5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod em CrashLoopBackOff: {{ $labels.pod }}"
              description: "O pod {{ $labels.pod }} reiniciou mais de 5 vezes em 15 minutos."

          - alert: PodMemoryHigh
            expr: |
              (container_memory_usage_bytes{namespace="devops-challenge"} /
               container_spec_memory_limit_bytes{namespace="devops-challenge"}) > 0.85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Container usando > 85% do limit de memória: {{ $labels.container }}"
              description: "{{ $labels.pod }}/{{ $labels.container }} está em {{ $value | humanizePercentage }} do limit."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"
            - "--web.listen-address=:9093"
          ports:
            - containerPort: 9093
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: data
              mountPath: /alertmanager
          resources:
            requests:
              memory: "32Mi"
              cpu: "20m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  selector:
    app: alertmanager
  type: NodePort
  ports:
    - port: 9093
      targetPort: 9093
      nodePort: 30093

global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: "app1-python"
    static_configs:
      - targets: ["app1:5000"]
    metrics_path: /metrics

  - job_name: "app2-node"
    static_configs:
      - targets: ["app2:3000"]
    metrics_path: /metrics

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: "nginx"
    static_configs:
      - targets: ["nginx-exporter:9113"]

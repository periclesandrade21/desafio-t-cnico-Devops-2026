proxy_cache_path /var/cache/nginx/app1
    levels=1:2
    keys_zone=app1_cache:10m
    max_size=100m
    inactive=1m
    use_temp_path=off;

proxy_cache_path /var/cache/nginx/app2
    levels=1:2
    keys_zone=app2_cache:10m
    max_size=100m
    inactive=2m
    use_temp_path=off;

server {
    listen 80;

    # ── App1 (Python/Flask) — cache 10 segundos ───────────────────────────────
    location /app1/ {
        proxy_pass         http://app1:5000/;
        proxy_set_header   Host           $host;
        proxy_set_header   X-Real-IP      $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_cache        app1_cache;
        proxy_cache_valid  200 10s;
        proxy_cache_key    "$scheme$request_method$host$request_uri";
        proxy_cache_use_stale error timeout updating;

        add_header X-Cache-Status $upstream_cache_status;
        add_header X-App          "app1-python";
    }

    # ── App2 (Node.js/Express) — cache 1 minuto ───────────────────────────────
    location /app2/ {
        proxy_pass         http://app2:3000/;
        proxy_set_header   Host           $host;
        proxy_set_header   X-Real-IP      $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_cache        app2_cache;
        proxy_cache_valid  200 60s;
        proxy_cache_key    "$scheme$request_method$host$request_uri";
        proxy_cache_use_stale error timeout updating;

        add_header X-Cache-Status $upstream_cache_status;
        add_header X-App          "app2-node";
    }

    # ── Nginx status (para o exporter Prometheus) ─────────────────────────────
    location /nginx_status {
        stub_status;
        allow 172.0.0.0/8;
        allow 10.0.0.0/8;
        allow 127.0.0.1;
        deny all;
    }

    # ── Health ────────────────────────────────────────────────────────────────
    location /health {
        return 200 '{"status":"ok","service":"nginx"}';
        add_header Content-Type application/json;
    }
}
